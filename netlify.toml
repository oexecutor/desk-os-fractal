# DESK-OS / TAL de Fractal — configuração simplificada para garantir o deploy

[build]
  # Comando simplificado: instala dependências e builda apenas o necessário para o web
  command = "pnpm install && pnpm run build"
  publish = "apps/web/dist"
  functions = "apps/functions/src/routes"

[build.environment]
  NODE_VERSION = "22"
  PNPM_FLAGS = "--frozen-lockfile=false"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "DENY"
    # CSP removida temporariamente para garantir que o site carregue sem bloqueios de segurança durante o debug
    # Content-Security-Policy = "..."
    Strict-Transport-Security = "max-age=63072000; includeSubDomains"
