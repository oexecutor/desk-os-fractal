# DESK-OS / TAL de Fractal — configuração Netlify (ADR-0017/CR-001, architecture/DEPLOYMENT.md)

[build]
  command = "corepack enable && pnpm install --frozen-lockfile && pnpm run build"
  publish = "apps/web/dist"
  functions = "apps/functions/src/routes"

[build.environment]
  NODE_VERSION = "24"

[functions]
  # Netlify Functions v2 ("path" declarado por Function, ver apps/functions/src/routes/*.ts).
  # Schemas são importados estaticamente (packages/schemas/src/schema-files.ts) e por isso
  # já entram no bundle — sem necessidade de `included_files`.
  node_bundler = "esbuild"

# SPA fallback: rotas do lado do cliente (/portfolio, /focus, /q/:token, ...) devolvem index.html.
# Assets estáticos existentes (JS/CSS/ícones) e as Functions em /api/* têm prioridade automática.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "DENY"
    Content-Security-Policy = "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), interest-cohort=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains"

# specs/QR_ROUTER.md / SECURITY_ARCHITECTURE.md: câmera liberada só na experiência de scanner.
[[headers]]
  for = "/scan/*"
  [headers.values]
    Permissions-Policy = "camera=(self), microphone=(), geolocation=()"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"
